<!DOCTYPE html>
<html>
<head>
  <title>Pro AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #ece5dd;
    }
    #chat {
      width: 300px;
      height: 400px;
      margin: auto;
      background: white;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
    }
    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      max-width: 70%;
    }
    .user {
      background: #dcf8c6;
      margin-left: auto;
      text-align: right;
    }
    .bot {
      background: #f1f0f0;
      margin-right: auto;
    }
    #inputBox {
      width: 300px;
      margin: auto;
      display: flex;
    }
    input {
      flex: 1;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<h3 style="text-align:center;">🤖 My Chatbot</h3>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Message...">
  <button onclick="send()">Send</button>
</div>
  
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});
  
<script>
function send() {
  let input = document.getElementById("input").value;
  if(input === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  let reply = "Samajh nahi aaya 😅";

  if(input.toLowerCase().includes("hello")) {
    reply = "Hello bhai 😎";
  }
  else if(input.toLowerCase().includes("kaise ho")) {
    reply = "Main mast hu 🔥 tu bata";
  }
  else if(input.toLowerCase().includes("business")) {
    reply = "Business start kar raha hai kya? 🚀";
  }
    else if(input.toLowerCase().includes("mobile")) {
  reply = "Mobile accessories ka business best hai 🔥";
}
else if(input.toLowerCase().includes("coding")) {
  reply = "Coding seekh raha hai? Bhai future bright hai 🚀";
}
  else if(input.toLowerCase().includes("name")) {
    reply = "Mera naam AI Bot hai 🤖";
  }

  setTimeout(() => {
    chat.innerHTML += `<div class="msg bot">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
