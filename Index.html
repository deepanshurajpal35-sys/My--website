<!DOCTYPE html>
<html>
<head>
  <title>My AI Chatbot</title>
</head>
<body>

<h2>🤖 Free Chatbot</h2>

<input id="input" placeholder="Ask anything">
<button onclick="send()">Send</button>

<p id="reply"></p>

<script>
function send() {
  let input = document.getElementById("input").value;
  let reply = "Samajh nahi aaya 😅";

  if(input.includes("hello")) {
    reply = "Hello bhai 😎";
  }

  document.getElementById("reply").innerText = reply;
}
</script>

</body>
</html>
