<!DOCTYPE html>
<html>
<head>
  <title>Shop Chatbot</title>
</head>

<body style="background:black; color:white; font-family:sans-serif; text-align:center;">

<h2>🛒 Mobile Shop Chatbot</h2>

<input id="input" placeholder="Ask about products..." />
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>
function send() {
  let input = document.getElementById("input").value.toLowerCase();
  if(input === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

  let reply = "Samajh nahi aaya 😅";

  if(input.includes("earphone")) {
    reply = "🎧 Earphones available hai - ₹199 se start 💰";
  }
  else if(input.includes("charger")) {
    reply = "🔌 Fast charger ₹299 🔥";
  }
  else if(input.includes("cover")) {
    reply = "📱 Mobile covers ₹99 se start 😎";
  }
  else if(input.includes("price")) {
    reply = "💰 Products ₹99 se ₹999 tak available hai";
  }
  else if(input.includes("location")) {
    reply = "📍 Sultanpur main shop hai bhai 😎";
  }
  else if(input.includes("delivery")) {
    reply = "🚚 Home delivery available hai";
  }
  else if(input.includes("contact")) {
    reply = "📞 Call karo: 7000406944";
  }

  chat.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
