<!DOCTYPE html>
<html>
<head>
  <title>Pro Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: #1f1f1f;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
    }

    .user {
      background: #4caf50;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #333;
      margin-right: auto;
    }

    #inputBox {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 15px;
      border: none;
      background: #4caf50;
      color: white;
      font-size: 16px;
    }

    .typing {
      font-style: italic;
      color: gray;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<header>🤖 My Pro Chatbot</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type message...">
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let input = document.getElementById("input").value;
  if(input === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${input}</div>`;

  // typing animation
  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "Bot is typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  let reply = "Samajh nahi aaya 😅";

  if(input.toLowerCase().includes("hello")) {
    reply = "Hello bhai 😎 kya help karu?";
  }
  else if(input.toLowerCase().includes("kaise ho")) {
    reply = "Main badhiya hu 🔥 tu bata kya chal raha hai?";
  }
  else if(input.toLowerCase().includes("business")) {
    reply = "Business start karna best decision hai 🚀";
  }
  else if(input.toLowerCase().includes("mobile")) {
    reply = "Mobile accessories ka business profitable hota hai 💰";
  }
  else if(input.toLowerCase().includes("coding")) {
    reply = "Coding seekh raha hai? Future set hai 😎";
  }
  else if(input.toLowerCase().includes("name")) {
    reply = "Main tera AI bot hu 🤖";
  }

  setTimeout(() => {
    typing.remove();
    chat.innerHTML += `<div class="msg bot">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 1000);

  document.getElementById("input").value = "";
}

// Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});
</script>

</body>
</html>
