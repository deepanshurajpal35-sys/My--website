
<!DOCTYPE html>
<html>
<head>
    <title>My Chatbot</title>
</head>

<body>

<h1>🤖 Mera Chatbot</h1>

<input type="text" id="userInput" placeholder="Kuch likho...">
<button onclick="reply()">Send</button>

<p id="botReply"></p>

<script>
function reply() {
    let input = document.getElementById("userInput").value;
    let output = "";

    if(input == "hello") {
        output = "Hello bhai 😎";
    }
    else if(input == "kaise ho") {
        output = "Main mast hoon 🔥";
    }
    else {
        output = "Samajh nahi aaya 😅";
    }

    document.getElementById("botReply").innerText = output;
}
</script>

</body>
</html>
