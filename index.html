<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
</head>

<body style="background:black; color:white; font-family:sans-serif;">

<h2>🤖 AI Chatbot</h2>

<input id="input" placeholder="Type..." />
<button onclick="send()">Send</button>

<div id="chat"></div>

<script>
async function send() {
  let input = document.getElementById("input").value;
  if(input === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

  try {
    let res = await fetch("https://api.affiliateplus.xyz/api/chatbot", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: input,
        botname: "MyBot",
        ownername: "Deepanshu"
      })
    });

    let data = await res.json();

    chat.innerHTML += "<p><b>Bot:</b> " + data.message + "</p>";
    chat.scrollTop = chat.scrollHeight;

  } catch (e) {
    chat.innerHTML += "<p><b>Bot:</b> Error 😅</p>";
  }

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
