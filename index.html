<!DOCTYPE html>
<html>
<head>
  <title>Pro Shop Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: #075e54;
      padding: 15px;
      text-align: center;
      font-size: 18px;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
    }

    .user {
      background: #25d366;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #333;
      margin-right: auto;
    }

    #inputBox {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
    }

    button {
      padding: 15px;
      border: none;
      background: #25d366;
      color: white;
    }

    a {
      color: yellow;
    }
  </style>
</head>

<body>

<header>🛒 My Mobile Shop</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let inputBox = document.getElementById("input");
  let text = inputBox.value.toLowerCase();

  if(text === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${text}</div>`;

  let reply = "Samajh nahi aaya 😅";

  if(text.includes("hi") || text.includes("hello")) {
    reply = "Hello bhai 😎 kya chahiye?";
  }
  else if(text.includes("earphone")) {
    reply = "🎧 Earphones ₹199 👉 type 'order earphone'";
  }
  else if(text.includes("charger")) {
    reply = "🔌 Charger ₹299 👉 type 'order charger'";
  }
  else if(text.includes("cover")) {
    reply = "📱 Cover ₹99 👉 type 'order cover'";
  }
  else if(text.includes("location")) {
    reply = "📍 sultanpur main shop hai";
  }
  else if(text.includes("contact")) {
    reply = "📞 Call: 7000406944";
  }

  // ORDER SYSTEM
  else if(text.includes("order")) {
    reply = "✅ Order confirm! WhatsApp par message karo 👉 <a href='https://wa.me/91XXXXXXXXXX'>Click here</a>";
  }

  chat.innerHTML += `<div class="msg bot">${reply}</div>`;
  chat.scrollTop = chat.scrollHeight;

  inputBox.value = "";
}

// enter key
document.getElementById("input").addEventListener("keypress", function(e) {
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
